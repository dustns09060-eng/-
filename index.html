<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ff4f87">
<title>여우방 팔로우리스트 · 맞팔확인</title>
<style>
*{box-sizing:border-box}
:root{--pink:#ff4f87;--deep:#d93673;--line:#ffd4e2;--bg:#fff7fa}
body{margin:0;padding:12px 12px 78px;font-family:Arial,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:#222}
button,input,textarea{font:inherit}
.hero{display:flex;align-items:center;gap:11px;padding:8px 3px 14px}
.logo{width:58px;height:58px;border-radius:18px;object-fit:cover;box-shadow:0 7px 18px rgba(217,54,115,.2)}
.hero small{font-weight:900;letter-spacing:1.7px;color:#9d4365}
h1{font-size:23px;color:var(--deep);margin:2px 0 0}h2{font-size:18px;margin:0 0 10px}h3{margin:17px 0 8px;color:var(--deep)}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px;margin-bottom:11px;box-shadow:0 5px 14px rgba(255,79,135,.08)}
.top-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
button,.button-link{border:0;border-radius:12px;padding:11px;background:var(--pink);color:#fff;font-weight:800;text-align:center;text-decoration:none}
.top-tabs button{background:#fff;color:#555;border:1px solid #bbb}.top-tabs button.active{background:#222;color:#fff;border-color:#222}
.full,.button-link{display:block;width:100%}.dark{background:#222}.outline{background:#fff;color:var(--deep);border:1px solid #ff95bb}.danger{color:#d72c40}
.field{width:100%;padding:11px;border:1px solid #bbb;border-radius:12px;margin:5px 0 8px;background:#fff}
.scroll-buttons,.filter-buttons{display:flex;gap:6px;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch}
.scroll-buttons button,.filter-buttons button{white-space:nowrap;background:#fff;color:#444;border:1px solid #aaa;padding:8px 10px}
.scroll-buttons button.active,.filter-buttons button.active{background:#222;color:#fff}
.muted{font-size:12px;color:#777;line-height:1.5}.help{background:#f5f5f5;border-radius:12px;padding:9px;font-size:12px;color:#666;line-height:1.5;margin-top:8px}
.room-row,.check-row{display:grid;grid-template-columns:minmax(115px,1fr) auto;align-items:center;gap:7px;min-height:42px;padding:7px 3px;border-bottom:1px solid #e8e8e8;background:#fff}
.check-row{grid-template-columns:minmax(115px,1fr) auto auto}
.main{min-width:0}.name{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.id{font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.insta{color:#1769c2;text-decoration:underline;font-size:12px;white-space:nowrap}.insta-btn{color:#fff;background:var(--deep);border-radius:999px;padding:7px 9px;font-size:11px;font-weight:800;text-decoration:none}
.status{font-size:11px;border-radius:999px;padding:5px 7px;white-space:nowrap}.mutual{background:#dcf6e5;color:#176e37}.onlyMe{background:#ffe1e4;color:#ac2637}.onlyThem{background:#fff0bd;color:#7c5a00}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.stats>div{text-align:center;border:1px solid var(--line);border-radius:13px;padding:8px 3px}.stats b{display:block;color:var(--deep);font-size:18px}.stats span{font-size:10px}
.notice{background:#fff0f5;border:1px solid #ffc5d8;border-radius:12px;padding:10px;white-space:pre-line;font-size:13px;margin-bottom:10px}
.hidden{display:none!important}.empty{text-align:center;color:#777;padding:24px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:#fff;border-radius:22px;padding:16px;width:100%;max-width:430px;max-height:88vh;overflow:auto}
.two-cols{display:grid;grid-template-columns:1fr 1fr;gap:7px}.three-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.three-cols button{padding:9px 4px;font-size:12px}
details{margin-top:14px;background:#f7f7f7;border-radius:12px;padding:9px}pre{white-space:pre-wrap;font-size:11px;color:#555}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;display:flex;background:#fff;box-shadow:0 -4px 12px rgba(0,0,0,.08);z-index:20}
.bottom-nav button{flex:1;border-radius:0;background:#fff;color:var(--deep);font-size:17px;padding:7px 3px}.bottom-nav span{display:block;font-size:11px;margin-top:2px}
@media(max-width:360px){.check-row{grid-template-columns:minmax(95px,1fr) auto auto}.insta-btn{padding:6px 7px}}
</style>
</head>

<script>
const SHEET_ID="1m14GywxIymZp6p9izJ6QVWaC8fCnjr5F5OdXCKKUcss";
const SHEET_NAME="Sheet1";
const ADMIN_PASSWORD="0702";
const PAGE_SIZE=500;
let roomData=[],listPage='all',followers=new Set(),following=new Set(),checkResults=[],checkFilter='all',lastDebug=null;
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const normalize=v=>String(v||'').trim().replace(/^@/,'').replace(/^https?:\/\/(www\.)?instagram\.com\//i,'').replace(/^_u\//i,'').split(/[/?#]/)[0].replace(/\/$/,'').toLowerCase();

function switchPage(page){$('listPage').classList.toggle('hidden',page!=='list');$('checkPage').classList.toggle('hidden',page!=='check');$('tabList').classList.toggle('active',page==='list');$('tabCheck').classList.toggle('active',page==='check');window.scrollTo(0,0)}

function loadRoomJsonp(){return new Promise((resolve,reject)=>{const cb='roomCb_'+Date.now(),s=document.createElement('script');const timer=setTimeout(()=>{cleanup();reject(new Error('timeout'))},12000);function cleanup(){clearTimeout(timer);try{delete window[cb]}catch(e){}s.remove()}window[cb]=json=>{cleanup();resolve(json)};s.onerror=()=>{cleanup();reject(new Error('load'))};s.src='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?sheet='+encodeURIComponent(SHEET_NAME)+'&tqx=responseHandler:'+cb+';out:json&cache='+Date.now();document.head.appendChild(s)})}

async function loadRoomList(){$('listCount').textContent='불러오는 중...';try{const json=await loadRoomJsonp();const rows=json.table?.rows||[];roomData=rows.map(r=>{const c=r.c||[];return{no:Number(String(c[0]?.v??'').replace(/[^0-9]/g,'')),nickname:String(c[1]?.v??'').trim(),id:normalize(c[2]?.v??'')}}).filter(x=>x.no&&x.nickname&&x.id).sort((a,b)=>a.no-b.no);$('adminRoomCount').textContent=roomData.length.toLocaleString();buildPageButtons();renderRoomList();if(followers.size||following.size)buildCheckResults()}catch(e){$('listCount').textContent='연동 오류';$('roomList').innerHTML='<div class="empty">명단을 불러오지 못했습니다.</div>'}}

function buildPageButtons(){const maxNo=roomData.length?Math.max(...roomData.map(x=>x.no)):0,pages=Math.ceil(maxNo/PAGE_SIZE);let html='<button class="'+(listPage==='all'?'active':'')+'" data-list-page="all">전체</button>';for(let i=0;i<pages;i++){const start=i*PAGE_SIZE+1,end=Math.min((i+1)*PAGE_SIZE,maxNo);html+='<button class="'+(listPage===i?'active':'')+'" data-list-page="'+i+'">'+start+'~'+end+'</button>'}$('pageButtons').innerHTML=html}

function renderRoomList(){const q=$('listSearch').value.toLowerCase().trim();const arr=roomData.filter(x=>{const hit=(x.no+' '+x.nickname+' '+x.id).toLowerCase().includes(q);if(listPage==='all')return hit;const start=listPage*PAGE_SIZE+1,end=(listPage+1)*PAGE_SIZE;return hit&&x.no>=start&&x.no<=end});$('listCount').textContent='검색 결과 '+arr.length.toLocaleString()+'명';$('roomList').innerHTML=arr.length?arr.map(x=>'<div class="room-row"><div class="main"><div class="name">'+x.no+'. '+esc(x.nickname)+'</div><div class="id">@'+esc(x.id)+'</div></div><a class="insta" target="_blank" rel="noopener" href="https://instagram.com/'+encodeURIComponent(x.id)+'">@'+esc(x.id)+'</a></div>').join(''):'<div class="empty">표시할 인원이 없습니다.</div>'}

function extractFromHtml(text){const doc=new DOMParser().parseFromString(text,'text/html'),ids=new Set();doc.querySelectorAll('a').forEach(a=>{const href=a.getAttribute('href')||'',txt=(a.textContent||'').trim();let id='';const m=href.match(/instagram\.com\/(?:_u\/)?([^/?#]+)/i);if(m)id=m[1];else if(/^[A-Za-z0-9._]+$/.test(txt))id=txt;id=normalize(id);if(id&&/^[a-z0-9._]+$/.test(id)&&!['accounts','explore','p','reel'].includes(id))ids.add(id)});return ids}
function extractFromJson(text){const ids=new Set(),obj=JSON.parse(text);function walk(v){if(Array.isArray(v)){v.forEach(walk);return}if(!v||typeof v!=='object')return;if(Array.isArray(v.string_list_data))v.string_list_data.forEach(item=>{const id=normalize(item.value||item.href||'');if(id&&/^[a-z0-9._]+$/.test(id))ids.add(id)});if(typeof v.title==='string'){const id=normalize(v.title);if(id&&/^[a-z0-9._]+$/.test(id))ids.add(id)}Object.values(v).forEach(walk)}walk(obj);return ids}

async function analyzeZip(){const file=$('instagramZip').files[0];if(!file){alert('인스타그램 ZIP 파일을 선택해주세요.');return}$('zipProgress').textContent='ZIP 파일 읽는 중...';try{const zip=await JSZip.loadAsync(file),names=Object.keys(zip.files).filter(n=>!zip.files[n].dir);const followersFiles=names.filter(n=>/(^|\/)followers(_\d+)?\.(html|json)$/i.test(n));const followingFiles=names.filter(n=>/(^|\/)following\.(html|json)$/i.test(n));if(!followersFiles.length||!followingFiles.length)throw new Error('ZIP 안에서 followers / following 파일을 찾지 못했습니다.');const nf=new Set(),ng=new Set();let done=0,total=followersFiles.length+followingFiles.length;for(const name of followersFiles){$('zipProgress').textContent='팔로워 분석 중... '+Math.round(done/total*100)+'%';const text=await zip.file(name).async('text'),ids=/\.json$/i.test(name)?extractFromJson(text):extractFromHtml(text);ids.forEach(id=>nf.add(id));done++}for(const name of followingFiles){$('zipProgress').textContent='팔로잉 분석 중... '+Math.round(done/total*100)+'%';const text=await zip.file(name).async('text'),ids=/\.json$/i.test(name)?extractFromJson(text):extractFromHtml(text);ids.forEach(id=>ng.add(id));done++}followers=nf;following=ng;if(!roomData.length)await loadRoomList();buildCheckResults();lastDebug={file:file.name,followersFiles,followingFiles,followers:followers.size,following:following.size,mutual:checkResults.filter(x=>x.status==='mutual').length,onlyMe:checkResults.filter(x=>x.status==='onlyMe').length,onlyThem:checkResults.filter(x=>x.status==='onlyThem').length,analyzedAt:new Date().toLocaleString()};localStorage.setItem('yeowooLastDebug',JSON.stringify(lastDebug));updateDebug();$('zipProgress').textContent='분석 완료 · 팔로워 '+followers.size.toLocaleString()+'명 / 팔로잉 '+following.size.toLocaleString()+'명';$('checkResults').classList.remove('hidden')}catch(e){$('zipProgress').textContent='분석 실패';alert(e.message||'ZIP 파일 분석에 실패했습니다.')}}

function buildCheckResults(){const roomMap=new Map(roomData.map(x=>[x.id,x])),all=new Set([...followers,...following]);checkResults=[...all].map(id=>{const f=followers.has(id),g=following.has(id),status=f&&g?'mutual':g?'onlyMe':'onlyThem',room=roomMap.get(id);return{id,status,no:room?.no||'',nickname:room?.nickname||'',inRoom:!!room}}).sort((a,b)=>(a.no||999999)-(b.no||999999)||a.id.localeCompare(b.id));const mutual=checkResults.filter(x=>x.status==='mutual').length,onlyMe=checkResults.filter(x=>x.status==='onlyMe').length,onlyThem=checkResults.filter(x=>x.status==='onlyThem').length,roomMatched=checkResults.filter(x=>x.inRoom).length;$('followersCount').textContent=followers.size.toLocaleString();$('followingCount').textContent=following.size.toLocaleString();$('mutualCount').textContent=mutual.toLocaleString();$('onlyMeCount').textContent=onlyMe.toLocaleString();$('onlyThemCount').textContent=onlyThem.toLocaleString();$('matchedRoomCount').textContent=roomMatched.toLocaleString();$('adminMutual').textContent=mutual.toLocaleString();$('adminIssue').textContent=(onlyMe+onlyThem).toLocaleString();renderCheck()}

function badge(status){return'<span class="status '+status+'">'+({mutual:'맞팔',onlyMe:'나만',onlyThem:'상대만'}[status])+'</span>'}
function renderCheck(){const q=$('checkSearch').value.toLowerCase().trim();const arr=checkResults.filter(x=>(checkFilter==='all'||x.status===checkFilter)&&(x.no+' '+x.nickname+' '+x.id).toLowerCase().includes(q));$('checkCount').textContent='검색 결과 '+arr.length.toLocaleString()+'명';$('checkList').innerHTML=arr.length?arr.map(x=>'<div class="check-row"><div class="main"><div class="name">'+esc((x.no?x.no+'. ':'')+(x.nickname||x.id))+'</div><div class="id">@'+esc(x.id)+'</div></div>'+badge(x.status)+'<a class="insta-btn" target="_blank" rel="noopener" href="https://instagram.com/'+encodeURIComponent(x.id)+'">인스타</a></div>').join(''):'<div class="empty">표시할 결과가 없습니다.</div>'}

function openAdmin(){$('adminModal').classList.remove('hidden')}function closeAdmin(){$('adminModal').classList.add('hidden')}function adminLogin(){if($('adminPw').value===ADMIN_PASSWORD)$('adminPanel').classList.remove('hidden');else alert('비밀번호가 틀렸습니다.')}
function saveNotice(){const v=$('noticeInput').value.trim();localStorage.setItem('yeowooNotice',v);showNotice();alert('공지 저장 완료')}function deleteNotice(){localStorage.removeItem('yeowooNotice');$('noticeInput').value='';showNotice();alert('공지 삭제 완료')}function showNotice(){const v=localStorage.getItem('yeowooNotice')||'';if(v){$('noticeBox').classList.remove('hidden');$('noticeBox').textContent='📢 '+v;$('noticeInput').value=v}else{$('noticeBox').classList.add('hidden');$('noticeBox').textContent=''}}
function downloadCsv(status){const rows=checkResults.filter(x=>x.status===status);if(!rows.length){alert('다운로드할 결과가 없습니다.');return}const labels={mutual:'맞팔',onlyMe:'나만 팔로우',onlyThem:'상대만 팔로우'},matrix=[['번호','닉네임','아이디','상태'],...rows.map(x=>[x.no||'',x.nickname||'','@'+x.id,labels[x.status]])],csv=matrix.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n'),blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=labels[status]+'.csv';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function updateDebug(){if(!lastDebug)try{lastDebug=JSON.parse(localStorage.getItem('yeowooLastDebug')||'null')}catch(e){}$('debugInfo').textContent=lastDebug?JSON.stringify(lastDebug,null,2):'아직 분석 기록이 없습니다.'}

document.addEventListener('click',e=>{const page=e.target.closest('[data-page]')?.dataset.page;if(page)switchPage(page);const lb=e.target.closest('[data-list-page]');if(lb){listPage=lb.dataset.listPage==='all'?'all':Number(lb.dataset.listPage);buildPageButtons();renderRoomList()}const fb=e.target.closest('[data-filter]');if(fb){checkFilter=fb.dataset.filter;document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));fb.classList.add('active');renderCheck()}const csv=e.target.closest('[data-csv]')?.dataset.csv;if(csv)downloadCsv(csv)});
$('tabAdmin').onclick=openAdmin;$('bottomAdmin').onclick=openAdmin;$('adminClose').onclick=closeAdmin;$('adminLogin').onclick=adminLogin;$('reloadRoom').onclick=loadRoomList;$('adminReload').onclick=loadRoomList;$('analyzeZip').onclick=analyzeZip;$('listSearch').oninput=renderRoomList;$('checkSearch').oninput=renderCheck;$('noticeSave').onclick=saveNotice;$('noticeDelete').onclick=deleteNotice;
showNotice();updateDebug();loadRoomList();
</script>
