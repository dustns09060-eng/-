<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>여우방 팔로우리스트</title>
<style>
*{box-sizing:border-box}
:root{--pink:#ef4f86;--text:#222;--muted:#777;--line:#e9e9e9;--bg:#f7f7f8}
body{margin:0;padding:14px 14px 76px;font-family:Arial,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text)}
button,input,textarea{font:inherit}
header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:48px;height:48px;border-radius:14px;object-fit:cover}
h1{font-size:21px;margin:0}h2{font-size:18px;margin:0 0 12px}h3{font-size:15px;margin:20px 0 9px}
.small{font-size:12px;color:var(--muted);line-height:1.5}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
button,.btn{border:0;border-radius:11px;padding:11px 9px;font-weight:800;background:var(--pink);color:#fff;text-decoration:none;text-align:center}
.full{width:100%;display:block}
.field{width:100%;padding:12px;border:1px solid #d4d4d4;border-radius:11px;background:#fff;margin-bottom:8px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.outline{background:#fff;color:#444;border:1px solid #ccc}
.dark{background:#222}
.pages,.filters{display:flex;gap:6px;overflow-x:auto;padding:9px 0}
.pages button,.filters button{white-space:nowrap;background:#fff;color:#444;border:1px solid #ccc;padding:8px 10px}
.pages button.active,.filters button.active{background:#222;color:#fff}
.notice{background:#fff;border-left:4px solid var(--pink);border-radius:10px;padding:10px;margin-bottom:10px;font-size:13px;white-space:pre-line}
.hidden{display:none!important}
.list-row{display:grid;grid-template-columns:minmax(110px,1fr) auto;align-items:center;gap:8px;background:#fff;border-bottom:1px solid var(--line);padding:9px 3px}
.check-row{display:grid;grid-template-columns:minmax(110px,1fr) auto auto;align-items:center;gap:7px;background:#fff;border-bottom:1px solid var(--line);padding:9px 3px}
.main{min-width:0}.name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.id{font-size:12px;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link{font-size:12px;color:#1769c2;text-decoration:underline;white-space:nowrap}
.ig{font-size:11px;background:#222;color:#fff;text-decoration:none;border-radius:999px;padding:7px 9px}
.badge{font-size:11px;border-radius:999px;padding:5px 7px;white-space:nowrap}
.mutual{background:#e1f6e8;color:#1c713b}.onlyMe{background:#ffe4e7;color:#a72234}.onlyThem{background:#fff1c7;color:#7a5900}.missing{background:#eee;color:#555}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.stats>div{background:#fafafa;border:1px solid var(--line);border-radius:12px;padding:9px;text-align:center}
.stats b{display:block;font-size:19px}.stats span{font-size:11px;color:#666}
.help{background:#f5f5f5;border-radius:11px;padding:9px;font-size:12px;color:#666;line-height:1.5;margin-top:8px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;padding:15px;z-index:50}
.modal{width:100%;max-width:420px;max-height:88vh;overflow:auto;background:#fff;border-radius:18px;padding:16px}
.pin-wrap{display:flex;align-items:center;gap:8px}
.pin{font-size:24px!important;text-align:center;letter-spacing:12px;padding-left:22px!important}
.eye{width:48px;flex:none;background:#f2f2f2;color:#444}
.login-note{text-align:center;margin-top:6px}
.bottom{position:fixed;left:0;right:0;bottom:0;display:flex;background:#fff;border-top:1px solid var(--line);z-index:20}
.bottom button{flex:1;border-radius:0;background:#fff;color:#444;padding:8px 3px;font-size:17px}
.bottom span{display:block;font-size:11px;margin-top:2px}
.empty{text-align:center;color:#777;padding:24px}
textarea{resize:none}
</style>
</head>

  <div><h1>여우방 팔로우리스트</h1><div class="small">리스트 · 맞팔확인 · 운영진</div></div>
</header>

<div id="noticeBox" class="notice hidden"></div>

<section id="listPage">
  <div class="card">
    <h2>팔로우리스트</h2>
    <input id="listSearch" class="field" placeholder="번호 · 닉네임 · 아이디 검색">
    <button id="reloadRoom" class="full">새로고침</button>
    <div id="pageButtons" class="pages"></div>
    <div id="listCount" class="small">불러오는 중...</div>
  </div>
  <div id="roomList"></div>
</section>

<section id="checkPage" class="hidden">
  <div id="checkLocked" class="card hidden" style="text-align:center;padding:30px 16px">
    <div style="font-size:42px;margin-bottom:10px">🔒</div>
    <h2 style="margin-bottom:8px">맞팔확인이 잠겨있습니다</h2>
    <div class="small">운영진이 맞팔확인 기능을 잠금 설정했습니다.</div>
  </div>

  <div id="checkUnlocked">
  <div class="card">
    <h2>맞팔 확인</h2>
    <input id="instagramZip" class="field" type="file" accept=".zip,application/zip">
    <button id="analyzeZip" class="full">ZIP 분석 시작</button>
    <div id="zipProgress" class="small"></div>
    <div class="help">ZIP 안의 팔로워·팔로잉 자료를 읽은 뒤, 구글시트 Sheet1에 있는 명단만 비교합니다.</div>
  </div>

  <div id="checkResults" class="hidden">
    <div class="card">
      <div class="stats">
        <div><b id="mutualCount">0</b><span>맞팔</span></div>
        <div><b id="onlyMeCount">0</b><span>나만 팔로우</span></div>
        <div><b id="onlyThemCount">0</b><span>상대만 팔로우</span></div>
        <div><b id="missingCount">0</b><span>ZIP에 없음</span></div>
      </div>
      <div class="filters">
        <button class="active" data-filter="all">전체</button>
        <button data-filter="mutual">맞팔</button>
        <button data-filter="onlyMe">나만</button>
        <button data-filter="onlyThem">상대만</button>
        <button data-filter="missing">없음</button>
      </div>
      <input id="checkSearch" class="field" placeholder="번호 · 닉네임 · 아이디 검색">
      <div id="checkCount" class="small"></div>
      <div id="checkList"></div>
    </div>
  </div>
  </div>
</section>

<div id="adminModal" class="modal-bg hidden">
  <div class="modal">
    <h2>운영진 로그인</h2>
    <div id="loginBox">
      <div class="pin-wrap">
        <input id="adminPw" class="field pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" autocomplete="off">
        <button id="togglePw" class="eye" type="button">보기</button>
      </div>
      <button id="adminLogin" class="full">로그인</button>
      <button id="adminClose" class="full outline">닫기</button>
      <div class="small login-note">숫자 4자리 입력 후 로그인하세요.</div>
    </div>

    <div id="adminPanel" class="hidden">
      <div class="two">
        <button id="adminLogout" class="outline">로그아웃</button>
        <button id="adminPanelClose" class="outline">닫기</button>
      </div>

      <h3>맞팔확인 설정</h3>
      <div id="lockStatus" class="help" style="margin-bottom:8px"></div>
      <button id="toggleCheckLock" class="full dark">맞팔확인 잠금 변경</button>

      <h3>명단 관리</h3>
      <a class="btn full dark" href="https://docs.google.com/spreadsheets/d/1m14GywxIymZp6p9izJ6QVWaC8fCnjr5F5OdXCKKUcss/edit" target="_blank" rel="noopener">구글시트 열기</a>
      <button id="adminReload" class="full">명단 새로고침</button>

      <h3>공지 관리</h3>
      <textarea id="noticeInput" class="field" rows="4" placeholder="공지 내용을 입력하세요"></textarea>
      <div class="two">
        <button id="noticeSave">공지 저장</button>
        <button id="noticeDelete" class="outline">공지 삭제</button>
      </div>
    </div>
  </div>
</div>

<footer class="bottom">
  <button data-page="list">📋<span>리스트</span></button>
  <button data-page="check">🔎<span>맞팔확인</span></button>
  <button id="bottomAdmin">🔒<span>운영진</span></button>
</footer>

<script>
const SHEET_ID="1m14GywxIymZp6p9izJ6QVWaC8fCnjr5F5OdXCKKUcss";
const SHEET_NAME="Sheet1";
const ADMIN_PASSWORD="0702";
const PAGE_SIZE=500;
let roomData=[],listPage='all',followers=new Set(),following=new Set(),results=[],filter='all';

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const norm=v=>String(v||'').trim().replace(/^@/,'').replace(/^https?:\/\/(www\.)?instagram\.com\//i,'').replace(/^_u\//i,'').split(/[/?#]/)[0].toLowerCase();

function isCheckLocked(){return localStorage.getItem('yeowooCheckLocked')!=='0'}
function updateCheckLockUI(){
  const locked=isCheckLocked();
  $('checkLocked').classList.toggle('hidden',!locked);
  $('checkUnlocked').classList.toggle('hidden',locked);
  $('lockStatus').textContent=locked?'현재 상태: 🔒 잠금':'현재 상태: 🔓 사용 가능';
  $('toggleCheckLock').textContent=locked?'맞팔확인 잠금 풀기':'맞팔확인 잠그기';
}
function switchPage(page){
  $('listPage').classList.toggle('hidden',page!=='list');
  $('checkPage').classList.toggle('hidden',page!=='check');
  if(page==='check') updateCheckLockUI();
  window.scrollTo(0,0);
}

function loadSheet(){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now(),s=document.createElement('script');const timer=setTimeout(()=>{clean();reject(new Error('timeout'))},12000);function clean(){clearTimeout(timer);try{delete window[cb]}catch(e){}s.remove()}window[cb]=j=>{clean();resolve(j)};s.onerror=()=>{clean();reject(new Error('load'))};s.src='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?sheet='+encodeURIComponent(SHEET_NAME)+'&tqx=responseHandler:'+cb+';out:json&cache='+Date.now();document.head.appendChild(s)})}

async function loadRoom(){$('listCount').textContent='불러오는 중...';try{const j=await loadSheet(),rows=j.table?.rows||[];roomData=rows.map(r=>{const c=r.c||[];return{no:Number(String(c[0]?.v??'').replace(/[^0-9]/g,'')),nickname:String(c[1]?.v??'').trim(),id:norm(c[2]?.v??'')}}).filter(x=>x.no&&x.nickname&&x.id).sort((a,b)=>a.no-b.no);makePages();renderRoom();if(followers.size||following.size)buildResults()}catch(e){$('listCount').textContent='연동 오류';$('roomList').innerHTML='<div class="empty">명단을 불러오지 못했습니다.</div>'}}

function makePages(){const max=roomData.length?Math.max(...roomData.map(x=>x.no)):0,count=Math.ceil(max/PAGE_SIZE);let h='<button class="'+(listPage==='all'?'active':'')+'" data-list-page="all">전체</button>';for(let i=0;i<count;i++){const s=i*PAGE_SIZE+1,e=Math.min((i+1)*PAGE_SIZE,max);h+='<button class="'+(listPage===i?'active':'')+'" data-list-page="'+i+'">'+s+'~'+e+'</button>'}$('pageButtons').innerHTML=h}

function renderRoom(){const q=$('listSearch').value.toLowerCase().trim();const arr=roomData.filter(x=>{const hit=(x.no+' '+x.nickname+' '+x.id).toLowerCase().includes(q);if(listPage==='all')return hit;const s=listPage*PAGE_SIZE+1,e=(listPage+1)*PAGE_SIZE;return hit&&x.no>=s&&x.no<=e});$('listCount').textContent='검색 결과 '+arr.length.toLocaleString()+'명';$('roomList').innerHTML=arr.length?arr.map(x=>'<div class="list-row"><div class="main"><div class="name">'+x.no+'. '+esc(x.nickname)+'</div><div class="id">@'+esc(x.id)+'</div></div><a class="link" target="_blank" href="https://instagram.com/'+encodeURIComponent(x.id)+'">@'+esc(x.id)+'</a></div>').join(''):'<div class="empty">표시할 인원이 없습니다.</div>'}

function parseHtml(text){const doc=new DOMParser().parseFromString(text,'text/html'),set=new Set();doc.querySelectorAll('a').forEach(a=>{const href=a.getAttribute('href')||'',txt=(a.textContent||'').trim();let id='';const m=href.match(/instagram\.com\/(?:_u\/)?([^/?#]+)/i);if(m)id=m[1];else if(/^[A-Za-z0-9._]+$/.test(txt))id=txt;id=norm(id);if(id&&/^[a-z0-9._]+$/.test(id))set.add(id)});return set}
function parseJson(text){const set=new Set(),obj=JSON.parse(text);function walk(v){if(Array.isArray(v)){v.forEach(walk);return}if(!v||typeof v!=='object')return;if(Array.isArray(v.string_list_data))v.string_list_data.forEach(i=>{const id=norm(i.value||i.href||'');if(id&&/^[a-z0-9._]+$/.test(id))set.add(id)});if(typeof v.title==='string'){const id=norm(v.title);if(id&&/^[a-z0-9._]+$/.test(id))set.add(id)}Object.values(v).forEach(walk)}walk(obj);return set}

async function analyze(){const file=$('instagramZip').files[0];if(!file){alert('ZIP 파일을 선택해주세요.');return}$('zipProgress').textContent='분석 중...';try{const zip=await JSZip.loadAsync(file),names=Object.keys(zip.files).filter(n=>!zip.files[n].dir),ff=names.filter(n=>/(^|\/)followers(_\d+)?\.(html|json)$/i.test(n)),fg=names.filter(n=>/(^|\/)following\.(html|json)$/i.test(n));if(!ff.length||!fg.length)throw new Error('followers 또는 following 파일을 찾지 못했습니다.');const a=new Set(),b=new Set();for(const n of ff){const t=await zip.file(n).async('text'),ids=/\.json$/i.test(n)?parseJson(t):parseHtml(t);ids.forEach(x=>a.add(x))}for(const n of fg){const t=await zip.file(n).async('text'),ids=/\.json$/i.test(n)?parseJson(t):parseHtml(t);ids.forEach(x=>b.add(x))}followers=a;following=b;if(!roomData.length)await loadRoom();buildResults();$('zipProgress').textContent='분석 완료 · Sheet1 명단 '+roomData.length.toLocaleString()+'명 비교';$('checkResults').classList.remove('hidden')}catch(e){$('zipProgress').textContent='분석 실패';alert(e.message)}}

function buildResults(){results=roomData.map(x=>{const f=followers.has(x.id),g=following.has(x.id);let status='missing';if(f&&g)status='mutual';else if(g&&!f)status='onlyMe';else if(f&&!g)status='onlyThem';return{...x,status}});const c=s=>results.filter(x=>x.status===s).length;$('mutualCount').textContent=c('mutual').toLocaleString();$('onlyMeCount').textContent=c('onlyMe').toLocaleString();$('onlyThemCount').textContent=c('onlyThem').toLocaleString();$('missingCount').textContent=c('missing').toLocaleString();renderCheck()}

function badge(s){return'<span class="badge '+s+'">'+({mutual:'맞팔',onlyMe:'나만',onlyThem:'상대만',missing:'없음'}[s])+'</span>'}
function renderCheck(){const q=$('checkSearch').value.toLowerCase().trim(),arr=results.filter(x=>(filter==='all'||x.status===filter)&&(x.no+' '+x.nickname+' '+x.id).toLowerCase().includes(q));$('checkCount').textContent='검색 결과 '+arr.length.toLocaleString()+'명';$('checkList').innerHTML=arr.length?arr.map(x=>'<div class="check-row"><div class="main"><div class="name">'+x.no+'. '+esc(x.nickname)+'</div><div class="id">@'+esc(x.id)+'</div></div>'+badge(x.status)+'<a class="ig" target="_blank" href="https://instagram.com/'+encodeURIComponent(x.id)+'">인스타</a></div>').join(''):'<div class="empty">표시할 결과가 없습니다.</div>'}

function openAdmin(){$('adminModal').classList.remove('hidden');if(sessionStorage.getItem('yeowooAdmin')==='1')showAdmin() ;else setTimeout(()=>$('adminPw').focus(),100)}
function closeAdmin(){$('adminModal').classList.add('hidden')}
function showAdmin(){$('loginBox').classList.add('hidden');$('adminPanel').classList.remove('hidden')}
function login(){if($('adminPw').value===ADMIN_PASSWORD){sessionStorage.setItem('yeowooAdmin','1');showAdmin()}else{alert('비밀번호가 틀렸습니다.');$('adminPw').value='';$('adminPw').focus()}}
function logout(){sessionStorage.removeItem('yeowooAdmin');$('adminPanel').classList.add('hidden');$('loginBox').classList.remove('hidden');$('adminPw').value=''}

function toggleCheckLock(){
  const nextLocked=!isCheckLocked();
  localStorage.setItem('yeowooCheckLocked',nextLocked?'1':'0');
  updateCheckLockUI();
  alert(nextLocked?'맞팔확인을 잠갔습니다.':'맞팔확인 잠금을 풀었습니다.');
}

function saveNotice(){const v=$('noticeInput').value.trim();localStorage.setItem('yeowooNotice',v);showNotice();alert('저장 완료')}
function deleteNotice(){localStorage.removeItem('yeowooNotice');$('noticeInput').value='';showNotice();alert('삭제 완료')}
function showNotice(){const v=localStorage.getItem('yeowooNotice')||'';if(v){$('noticeBox').classList.remove('hidden');$('noticeBox').textContent='📢 '+v;$('noticeInput').value=v}else{$('noticeBox').classList.add('hidden')}}

function csv(status){const arr=results.filter(x=>x.status===status);if(!arr.length){alert('결과가 없습니다.');return}const labels={mutual:'맞팔',onlyMe:'나만',onlyThem:'상대만'},rows=[['번호','닉네임','아이디','상태'],...arr.map(x=>[x.no,x.nickname,'@'+x.id,labels[status]])],text=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n'),blob=new Blob(['\ufeff'+text],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=labels[status]+'.csv';a.click()}

document.addEventListener('click',e=>{const p=e.target.closest('[data-page]')?.dataset.page;if(p)switchPage(p);const lp=e.target.closest('[data-list-page]');if(lp){listPage=lp.dataset.listPage==='all'?'all':Number(lp.dataset.listPage);makePages();renderRoom()}const f=e.target.closest('[data-filter]');if(f){filter=f.dataset.filter;document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));f.classList.add('active');renderCheck()}});
$('bottomAdmin').onclick=openAdmin;$('adminClose').onclick=closeAdmin;$('adminPanelClose').onclick=closeAdmin;$('adminLogin').onclick=login;$('adminLogout').onclick=logout;$('togglePw').onclick=()=>{const show=$('adminPw').type==='password';$('adminPw').type=show?'text':'password';$('togglePw').textContent=show?'숨김':'보기'};$('adminPw').onkeydown=e=>{if(e.key==='Enter')login()};$('reloadRoom').onclick=loadRoom;$('adminReload').onclick=loadRoom;$('analyzeZip').onclick=analyze;$('listSearch').oninput=renderRoom;$('checkSearch').oninput=renderCheck;$('noticeSave').onclick=saveNotice;$('noticeDelete').onclick=deleteNotice;$('toggleCheckLock').onclick=toggleCheckLock;
showNotice();updateCheckLockUI();loadRoom();
</script>
</body>
