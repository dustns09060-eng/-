<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ff4f87">
  <title>여우방 팔로우리스트 · 맞팔확인</title>
  <link rel="icon" href="assets/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
<header class="hero">
  <img src="assets/icon-192.png" class="logo" alt="여우방">
  <div>
    <small>YEO WOO BANG</small>
    <h1>팔로우리스트 · 맞팔확인</h1>
  </div>
</header>

<div id="noticeBox" class="notice hidden"></div>

<nav class="top-tabs card">
  <button id="tabList" class="active" data-page="list">팔로우리스트</button>
  <button id="tabCheck" data-page="check">맞팔확인</button>
  <button id="tabAdmin">운영진</button>
</nav>

<main>
  <section id="listPage">
    <div class="card">
      <h2>팔로우리스트</h2>
      <input id="listSearch" class="field" placeholder="번호 · 닉네임 · 아이디 검색">
      <button id="reloadRoom" class="primary full">새로고침</button>
      <div id="pageButtons" class="scroll-buttons"></div>
      <div id="listCount" class="muted">불러오는 중...</div>
    </div>
    <div id="roomList"></div>
  </section>

  <section id="checkPage" class="hidden">
    <div class="card">
      <h2>인스타 ZIP 파일 첨부</h2>
      <input id="instagramZip" class="field" type="file" accept=".zip,application/zip">
      <button id="analyzeZip" class="primary full">ZIP 분석 시작</button>
      <div id="zipProgress" class="muted"></div>
      <div class="help">
        인스타그램에서 내려받은 ZIP 파일을 압축 해제하지 않고 그대로 선택하세요.
        파일은 서버로 전송되지 않고 현재 휴대폰 안에서만 분석됩니다.
      </div>
    </div>

    <div id="checkResults" class="hidden">
      <div class="card">
        <div class="stats">
          <div><b id="followersCount">0</b><span>팔로워</span></div>
          <div><b id="followingCount">0</b><span>팔로잉</span></div>
          <div><b id="mutualCount">0</b><span>맞팔</span></div>
          <div><b id="onlyMeCount">0</b><span>나만 팔로우</span></div>
          <div><b id="onlyThemCount">0</b><span>상대만 팔로우</span></div>
          <div><b id="matchedRoomCount">0</b><span>방명단 일치</span></div>
        </div>

        <div class="filter-buttons">
          <button class="active" data-filter="all">전체</button>
          <button data-filter="mutual">맞팔</button>
          <button data-filter="onlyMe">나만</button>
          <button data-filter="onlyThem">상대만</button>
        </div>

        <input id="checkSearch" class="field" placeholder="번호 · 닉네임 · 아이디 검색">
        <div id="checkCount" class="muted"></div>
        <div id="checkList"></div>
      </div>
    </div>
  </section>
</main>

<div id="adminModal" class="modal-backdrop hidden">
  <div class="modal">
    <h2>운영진 전용</h2>
    <input id="adminPw" class="field" type="password" placeholder="비밀번호 입력">
    <div class="two-cols">
      <button id="adminLogin" class="primary">로그인</button>
      <button id="adminClose" class="outline">닫기</button>
    </div>

    <div id="adminPanel" class="hidden">
      <h3>명단 관리</h3>
      <a class="button-link dark" href="https://docs.google.com/spreadsheets/d/1m14GywxIymZp6p9izJ6QVWaC8fCnjr5F5OdXCKKUcss/edit" target="_blank" rel="noopener">구글시트 열기</a>
      <button id="adminReload" class="primary full">명단 새로고침</button>

      <h3>공지 관리</h3>
      <textarea id="noticeInput" class="field" rows="4" placeholder="공지 내용을 입력하세요"></textarea>
      <div class="two-cols">
        <button id="noticeSave" class="primary">공지 저장</button>
        <button id="noticeDelete" class="outline danger">공지 삭제</button>
      </div>

      <h3>운영 통계</h3>
      <div class="stats compact">
        <div><b id="adminRoomCount">0</b><span>방 명단</span></div>
        <div><b id="adminMutual">0</b><span>맞팔</span></div>
        <div><b id="adminIssue">0</b><span>확인 필요</span></div>
      </div>

      <h3>결과 다운로드</h3>
      <div class="three-cols">
        <button data-csv="mutual">맞팔.csv</button>
        <button data-csv="onlyMe">나만.csv</button>
        <button data-csv="onlyThem">상대만.csv</button>
      </div>

      <details>
        <summary>분석 정보</summary>
        <pre id="debugInfo">아직 분석 기록이 없습니다.</pre>
      </details>
    </div>
  </div>
</div>

<footer class="bottom-nav">
  <button data-page="list">📋<span>리스트</span></button>
  <button data-page="check">🔎<span>맞팔확인</span></button>
  <button id="bottomAdmin">🔒<span>운영진</span></button>
</footer>
</body>
</html>
