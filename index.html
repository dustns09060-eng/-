<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>여우방 맞팔 확인</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:12px 12px 72px;font-family:Arial,"Malgun Gothic",sans-serif;background:#fff7fa;color:#222}
h1{font-size:23px;margin:4px 0} h2{font-size:18px;margin:0 0 10px}
.card{background:white;border:1px solid #ffd6e3;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 5px 14px rgba(255,79,135,.09)}
.sub{font-size:12px;color:#777;line-height:1.5}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}
.stat{border:1px solid #ffd6e3;border-radius:14px;padding:9px 3px;text-align:center}
.stat b{display:block;color:#e83e79;font-size:19px} .stat span{font-size:11px}
input[type=file],input[type=password],input[type=text],textarea{width:100%;padding:11px;border:1px solid #ccc;border-radius:12px;margin:5px 0 9px;background:white}
button,a.btn{display:block;width:100%;border:0;border-radius:12px;padding:11px;background:#ff4f87;color:white;font-weight:bold;text-align:center;text-decoration:none;margin-top:7px}
.dark{background:#222!important} .light{background:white!important;color:#ff4f87!important;border:1px solid #ff4f87!important}
.row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.filters{display:flex;gap:6px;overflow:auto;margin:10px 0}
.filters button{width:auto;min-width:88px;margin:0;background:white;color:#444;border:1px solid #bbb;white-space:nowrap}
.filters button.active{background:#222;color:white}
.person{display:flex;align-items:center;gap:8px;border-bottom:1px solid #eee;padding:8px 2px}
.info{flex:1;min-width:0} .name{font-weight:bold;font-size:13px} .id{font-size:12px;color:#1769c2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:11px;border-radius:999px;padding:5px 7px;white-space:nowrap;background:#eee}
.green{background:#ddf7e6;color:#14783b} .red{background:#ffe0e3;color:#b92234} .yellow{background:#fff1c7;color:#8a6100} .gray{background:#eee;color:#555}
.ig{font-size:11px;text-decoration:none;color:white;background:#e83e79;border-radius:999px;padding:7px 9px;white-space:nowrap}
.hidden{display:none}
.modalBg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;align-items:center;justify-content:center;padding:14px}
.modal{background:white;width:100%;max-width:430px;max-height:88vh;overflow:auto;border-radius:22px;padding:16px}
.notice{display:none;background:#fff0f5;border:1px solid #ffc5d8;border-radius:12px;padding:10px;margin-top:9px;white-space:pre-line;font-size:13px}
.bottom{position:fixed;bottom:0;left:0;right:0;display:flex;background:white;box-shadow:0 -4px 12px rgba(0,0,0,.08)}
.bottom button{flex:1;border-radius:0;margin:0;background:white;color:#e83e79;font-size:12px;padding:8px 3px}
</style>
</head>
<body>

<div class="card">
  <div class="sub">🦊 FOLLOW CHECK</div>
  <h1>여우방 맞팔 확인</h1>
  <div class="sub">인스타그램에서 받은 팔로워·팔로잉 HTML 파일을 선택하면 휴대폰 안에서만 비교합니다.</div>
  <div id="noticeBox" class="notice"></div>
</div>

<div class="card">
  <h2>1. 파일 선택</h2>
  <label class="sub">팔로워 HTML</label>
  <input id="followersFile" type="file" accept=".html,.htm">
  <label class="sub">팔로잉 HTML</label>
  <input id="followingFile" type="file" accept=".html,.htm">
  <button onclick="analyze()">맞팔 분석 시작</button>
  <div id="progress" class="sub" style="margin-top:8px"></div>
</div>

<div id="resultArea" class="hidden">
  <div class="card">
    <div class="grid">
      <div class="stat"><b id="mutualCount">0</b><span>맞팔</span></div>
      <div class="stat"><b id="onlyMeCount">0</b><span>나만 팔로우</span></div>
      <div class="stat"><b id="onlyThemCount">0</b><span>상대만 팔로우</span></div>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all',this)">전체</button>
      <button onclick="setFilter('mutual',this)">🟢 맞팔</button>
      <button onclick="setFilter('onlyMe',this)">🔴 나만</button>
      <button onclick="setFilter('onlyThem',this)">🟡 상대만</button>
      <button onclick="setFilter('roomOnly',this)">⚪ 방명단만</button>
    </div>
    <input id="search" type="text" placeholder="닉네임·아이디 검색" oninput="render()">
    <div id="list"></div>
  </div>
</div>

<div id="adminModal" class="modalBg">
  <div class="modal">
    <h2>🔒 운영진 전용</h2>
    <input id="adminPw" type="password" placeholder="비밀번호 입력">
    <div class="row">
      <button onclick="adminLogin()">로그인</button>
      <button class="light" onclick="closeAdmin()">닫기</button>
    </div>

    <div id="adminPanel" class="hidden">
      <h2 style="margin-top:16px">📋 명단 관리</h2>
      <a class="btn dark" href="https://docs.google.com/spreadsheets/d/1m14GywxIymZp6p9izJ6QVWaC8fCnjr5F5OdXCKKUcss/edit" target="_blank">구글시트 열기</a>
      <div class="sub" style="margin-top:7px">명단 추가·수정·삭제는 구글시트 앱에서 하고, 이 페이지에서 새로고침하면 반영됩니다.</div>

      <h2 style="margin-top:18px">📢 공지 관리</h2>
      <textarea id="noticeInput" rows="4" placeholder="공지 내용을 입력하세요"></textarea>
      <div class="row">
        <button onclick="saveNotice()">공지 저장</button>
        <button class="light" onclick="deleteNotice()">공지 삭제</button>
      </div>

      <h2 style="margin-top:18px">📊 운영 통계</h2>
      <div class="grid">
        <div class="stat"><b id="roomCount">0</b><span>방 명단</span></div>
        <div class="stat"><b id="adminMutual">0</b><span>맞팔</span></div>
        <div class="stat"><b id="adminIssue">0</b><span>확인 필요</span></div>
      </div>
      <button class="dark" onclick="loadRoomList()">구글시트 명단 새로고침</button>
    </div>
  </div>
</div>

<div class="bottom">
  <button onclick="window.scrollTo(0,0)">🏠<br>홈</button>
  <button onclick="loadRoomList()">🔄<br>새로고침</button>
  <button onclick="openAdmin()">🔒<br>운영진</button>
</div>

<script>
const SHEET_ID="1m14GywxIymZp6p9izJ6QVWaC8fCnjr5F5OdXCKKUcss";
const SHEET_NAME="Sheet1";
const ADMIN_PASSWORD="0702";

let followers=new Set();
let following=new Set();
let roomList=[];
let results=[];
let filter="all";

function normalizeId(v){
  return String(v||"").trim().replace(/^@/,"").replace(/\/$/,"").toLowerCase();
}

async function readHtml(file){
  if(!file) return [];
  const text=await file.text();
  const doc=new DOMParser().parseFromString(text,"text/html");
  const ids=new Set();

  doc.querySelectorAll("a").forEach(a=>{
    const href=a.getAttribute("href")||"";
    const txt=(a.textContent||"").trim();
    let id="";

    const match=href.match(/instagram\.com\/([^/?#]+)/i);
    if(match) id=match[1];
    else if(txt && !txt.includes(" ")) id=txt;

    id=normalizeId(id);
    if(id && !["accounts","explore","p","reel"].includes(id)) ids.add(id);
  });

  return [...ids];
}

function loadRoomJsonp(){
  return new Promise((resolve,reject)=>{
    const cb="roomCb_"+Date.now();
    const s=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("timeout"))},12000);
    function cleanup(){clearTimeout(timer);try{delete window[cb]}catch(e){};s.remove()}
    window[cb]=json=>{cleanup();resolve(json)};
    s.onerror=()=>{cleanup();reject(new Error("load"))};
    s.src="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?sheet="+encodeURIComponent(SHEET_NAME)+"&tqx=responseHandler:"+cb+";out:json&cache="+Date.now();
    document.head.appendChild(s);
  });
}

async function loadRoomList(){
  try{
    const json=await loadRoomJsonp();
    const rows=(json.table&&json.table.rows)||[];
    roomList=rows.map(r=>{
      const c=r.c||[];
      return {
        no:Number(String(c[0]?.v??"").replace(/[^0-9]/g,"")),
        nickname:String(c[1]?.v??"").trim(),
        id:normalizeId(c[2]?.v??"")
      };
    }).filter(x=>x.no&&x.nickname&&x.id).sort((a,b)=>a.no-b.no);

    document.getElementById("roomCount").textContent=roomList.length.toLocaleString();
    if(followers.size||following.size) buildResults();
  }catch(e){
    alert("구글시트 명단을 불러오지 못했습니다.");
  }
}

async function analyze(){
  const f1=document.getElementById("followersFile").files[0];
  const f2=document.getElementById("followingFile").files[0];

  if(!f1||!f2){
    alert("팔로워와 팔로잉 HTML 파일을 모두 선택해주세요.");
    return;
  }

  document.getElementById("progress").textContent="분석 중...";
  const [a,b]=await Promise.all([readHtml(f1),readHtml(f2)]);
  followers=new Set(a);
  following=new Set(b);

  if(!roomList.length) await loadRoomList();
  buildResults();

  document.getElementById("progress").textContent="분석 완료";
  document.getElementById("resultArea").classList.remove("hidden");
}

function buildResults(){
  const roomMap=new Map(roomList.map(x=>[x.id,x]));
  const allIds=new Set([...followers,...following,...roomMap.keys()]);
  results=[...allIds].map(id=>{
    const inFollowers=followers.has(id);
    const inFollowing=following.has(id);
    let status="roomOnly";
    if(inFollowers&&inFollowing) status="mutual";
    else if(inFollowing&&!inFollowers) status="onlyMe";
    else if(inFollowers&&!inFollowing) status="onlyThem";

    const room=roomMap.get(id);
    return {
      id,
      no:room?room.no:"",
      nickname:room?room.nickname:"",
      inRoom:!!room,
      status
    };
  }).sort((a,b)=>(a.no||999999)-(b.no||999999)||a.id.localeCompare(b.id));

  updateStats();
  render();
}

function updateStats(){
  const mutual=results.filter(x=>x.status==="mutual").length;
  const onlyMe=results.filter(x=>x.status==="onlyMe").length;
  const onlyThem=results.filter(x=>x.status==="onlyThem").length;
  document.getElementById("mutualCount").textContent=mutual.toLocaleString();
  document.getElementById("onlyMeCount").textContent=onlyMe.toLocaleString();
  document.getElementById("onlyThemCount").textContent=onlyThem.toLocaleString();
  document.getElementById("adminMutual").textContent=mutual.toLocaleString();
  document.getElementById("adminIssue").textContent=(onlyMe+onlyThem).toLocaleString();
}

function setFilter(v,el){
  filter=v;
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  render();
}

function badge(status){
  if(status==="mutual") return '<span class="badge green">맞팔</span>';
  if(status==="onlyMe") return '<span class="badge red">나만</span>';
  if(status==="onlyThem") return '<span class="badge yellow">상대만</span>';
  return '<span class="badge gray">방명단</span>';
}

function esc(s){
  return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function render(){
  const q=(document.getElementById("search")?.value||"").toLowerCase().trim();
  const arr=results.filter(x=>{
    if(filter!=="all"&&x.status!==filter) return false;
    return (x.nickname+" "+x.id+" "+x.no).toLowerCase().includes(q);
  });

  const box=document.getElementById("list");
  if(!arr.length){box.innerHTML='<div class="sub" style="padding:20px;text-align:center">표시할 결과가 없습니다.</div>';return}

  box.innerHTML=arr.map(x=>{
    const title=(x.no?x.no+". ":"")+(x.nickname||x.id);
    return '<div class="person">'+
      '<div class="info"><div class="name">'+esc(title)+'</div><div class="id">@'+esc(x.id)+'</div></div>'+
      badge(x.status)+
      '<a class="ig" target="_blank" href="https://instagram.com/'+encodeURIComponent(x.id)+'">인스타</a>'+
    '</div>';
  }).join("");
}

function openAdmin(){document.getElementById("adminModal").style.display="flex"}
function closeAdmin(){document.getElementById("adminModal").style.display="none"}
function adminLogin(){
  if(document.getElementById("adminPw").value===ADMIN_PASSWORD){
    document.getElementById("adminPanel").classList.remove("hidden");
  }else alert("비밀번호가 틀렸습니다.");
}

function saveNotice(){
  const v=document.getElementById("noticeInput").value.trim();
  localStorage.setItem("yeowooAdminNotice",v);
  showNotice();
  alert("공지 저장 완료");
}
function deleteNotice(){
  localStorage.removeItem("yeowooAdminNotice");
  document.getElementById("noticeInput").value="";
  showNotice();
  alert("공지 삭제 완료");
}
function showNotice(){
  const v=localStorage.getItem("yeowooAdminNotice")||"";
  const box=document.getElementById("noticeBox");
  if(v){
    box.style.display="block";
    box.textContent="📢 "+v;
    document.getElementById("noticeInput").value=v;
  }else{
    box.style.display="none";
    box.textContent="";
  }
}

showNotice();
loadRoomList();
</script>
</body>
</html>
