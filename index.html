<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>여우방 명단</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  padding:10px;
  font-family:Arial,"Malgun Gothic",sans-serif;
  background:#fff;
  color:#222;
}
h1{
  margin:0 0 10px;
  font-size:21px;
}
.tools{
  border:1px solid #bbb;
  padding:9px;
  margin-bottom:10px;
}
input{
  width:100%;
  padding:9px 10px;
  font-size:14px;
  border:1px solid #aaa;
  margin-bottom:7px;
}
button{
  padding:8px 10px;
  border:1px solid #888;
  background:#f4f4f4;
  color:#222;
  font-size:13px;
  font-weight:bold;
}
.pages{
  display:flex;
  gap:5px;
  overflow-x:auto;
  padding:8px 0 2px;
  -webkit-overflow-scrolling:touch;
}
.page-btn{
  white-space:nowrap;
  min-width:58px;
}
.active{
  background:#222;
  color:#fff;
}
.count{
  margin-top:7px;
  color:#666;
  font-size:12px;
}
.person{
  display:grid;
  grid-template-columns:42px minmax(80px,1fr) auto;
  align-items:center;
  gap:7px;
  min-height:35px;
  padding:5px 2px;
  border-bottom:1px solid #e5e5e5;
  font-size:13px;
}
.no{
  font-weight:bold;
  text-align:right;
}
.name{
  font-weight:bold;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}
.insta{
  color:#1666c1;
  text-decoration:underline;
  white-space:nowrap;
  max-width:155px;
  overflow:hidden;
  text-overflow:ellipsis;
}
.empty{
  padding:24px 0;
  text-align:center;
  color:#777;
}
@media (max-width:380px){
  .person{
    grid-template-columns:36px minmax(70px,1fr) auto;
    gap:5px;
    font-size:12px;
  }
  .insta{
    max-width:125px;
  }
}
</style>
</head>
<body>

<h1>여우방 명단</h1>

<div class="tools">
  <input id="search" placeholder="번호, 닉네임, 아이디 검색" oninput="render()">
  <button onclick="loadData()">새로고침</button>
  <div id="pages" class="pages"></div>
  <div id="count" class="count">불러오는 중...</div>
</div>

<div id="list"></div>

<script>
const SHEET_ID="1m14GywxIymZp6p9izJ6QVWaC8fCnjr5F5OdXCKKUcss";
const SHEET_NAME="Sheet1";
const PAGE_SIZE=500;

let data=[];
let currentPage="전체";

function normalizeInsta(value){
  value=String(value||"").trim();
  if(!value) return "";
  return value.startsWith("@") ? value : "@"+value;
}

function loadWithJsonp(){
  return new Promise((resolve,reject)=>{
    const callbackName="yeowooLiteV5_"+Date.now();
    const script=document.createElement("script");

    const timer=setTimeout(()=>{
      cleanup();
      reject(new Error("timeout"));
    },12000);

    function cleanup(){
      clearTimeout(timer);
      try{delete window[callbackName];}catch(e){}
      script.remove();
    }

    window[callbackName]=function(json){
      cleanup();
      resolve(json);
    };

    script.onerror=function(){
      cleanup();
      reject(new Error("load error"));
    };

    script.src=
      "https://docs.google.com/spreadsheets/d/"+SHEET_ID+
      "/gviz/tq?sheet="+encodeURIComponent(SHEET_NAME)+
      "&tqx=responseHandler:"+callbackName+";out:json&cache="+Date.now();

    document.head.appendChild(script);
  });
}

function parseRows(json){
  const rows=(json.table&&json.table.rows)?json.table.rows:[];

  return rows.map(function(row){
    const cells=row.c||[];

    return {
      no:Number(String(cells[0]&&cells[0].v!=null?cells[0].v:"").replace(/[^0-9]/g,"")),
      nickname:String(cells[1]&&cells[1].v!=null?cells[1].v:"").trim(),
      insta:normalizeInsta(cells[2]&&cells[2].v!=null?cells[2].v:"")
    };
  })
  .filter(function(item){
    return item.no&&item.nickname&&item.insta;
  })
  .sort(function(a,b){
    return a.no-b.no;
  });
}

async function loadData(){
  document.getElementById("count").textContent="불러오는 중...";
  document.getElementById("list").innerHTML="";

  try{
    const json=await loadWithJsonp();
    data=parseRows(json);
    makePages();
    render();
  }catch(error){
    document.getElementById("count").textContent="연동 오류";
    document.getElementById("list").innerHTML=
      '<div class="empty">명단을 불러오지 못했습니다.<br>잠시 후 새로고침해주세요.</div>';
  }
}

function makePages(){
  const maxNo=data.length
    ? Math.max.apply(null,data.map(function(item){return item.no;}))
    : 0;

  const pageCount=Math.ceil(maxNo/PAGE_SIZE);

  let html=
    '<button class="page-btn '+(currentPage==="전체"?"active":"")+
    '" onclick="selectPage(\'전체\')">전체</button>';

  for(let i=0;i<pageCount;i++){
    const start=i*PAGE_SIZE+1;
    const end=Math.min((i+1)*PAGE_SIZE,maxNo);
    const label=start+"~"+end;

    html+=
      '<button class="page-btn '+(currentPage===i?"active":"")+
      '" onclick="selectPage('+i+')">'+label+'</button>';
  }

  document.getElementById("pages").innerHTML=html;
}

function selectPage(page){
  currentPage=page;
  makePages();
  render();
  window.scrollTo(0,0);
}

function escapeHtml(text){
  return String(text).replace(/[&<>"']/g,function(char){
    return {
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    }[char];
  });
}

function render(){
  const query=document.getElementById("search").value.toLowerCase().trim();

  const filtered=data.filter(function(item){
    const text=(item.no+" "+item.nickname+" "+item.insta).toLowerCase();
    const searchMatch=text.includes(query);

    if(currentPage==="전체"){
      return searchMatch;
    }

    const start=currentPage*PAGE_SIZE+1;
    const end=(currentPage+1)*PAGE_SIZE;

    return searchMatch&&item.no>=start&&item.no<=end;
  });

  document.getElementById("count").textContent=
    "검색 결과 "+filtered.length.toLocaleString()+"명";

  if(!filtered.length){
    document.getElementById("list").innerHTML=
      '<div class="empty">표시할 인원이 없습니다.</div>';
    return;
  }

  let html="";

  filtered.forEach(function(item){
    const instagramId=item.insta.replace("@","");

    html+=
      '<div class="person">'+
        '<div class="no">'+item.no+'.</div>'+
        '<div class="name">'+escapeHtml(item.nickname)+'</div>'+
        '<a class="insta" target="_blank" rel="noopener" href="https://www.instagram.com/'+
          encodeURIComponent(instagramId)+'/">'+
          escapeHtml(item.insta)+
        '</a>'+
      '</div>';
  });

  document.getElementById("list").innerHTML=html;
}

loadData();
</script>
</body>
</html>
