<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>여우방 명단 Lite</title>
<style>
body{font-family:Arial,'Malgun Gothic',sans-serif;margin:0;padding:12px;background:#fff;color:#222}
h1{margin:0 0 12px;font-size:22px}
.box{border:1px solid #bbb;padding:10px;margin-bottom:12px}
input{width:100%;padding:10px;box-sizing:border-box;border:1px solid #aaa;margin-bottom:8px}
button{padding:8px 12px;border:1px solid #888;background:#f5f5f5;font-weight:bold}
.pages{display:flex;gap:6px;overflow:auto;margin-top:8px}
.active{background:#222;color:#fff}
.row{display:flex;align-items:center;gap:8px;padding:6px 2px;border-bottom:1px solid #e5e5e5;font-size:14px}
.no{width:42px;font-weight:bold}
.name{flex:1;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.insta{color:#1666c1;text-decoration:none;white-space:nowrap}
.count{margin-top:8px;color:#666;font-size:13px}
</style></head>
<body>
<h1>여우방 명단</h1>
<div class="box">
<input placeholder="번호, 닉네임, 아이디 검색">
<button>새로고침</button>
<div class="pages">
<button class="active">전체</button><button>1~500</button><button>501~1000</button><button>1001~1500</button><button>1501~2000</button><button>2001~끝</button>
</div>
<div class="count">※ 한 줄형 초슬림 레이아웃 예시</div>
</div>

<div class="row"><div class="no">1.</div><div class="name">꼬꼬</div><a class="insta" href="#">@kokkooo</a></div>
<div class="row"><div class="no">2.</div><div class="name">유별맘</div><a class="insta" href="#">@mom____</a></div>
<div class="row"><div class="no">3.</div><div class="name">닉네임</div><a class="insta" href="#">@instagram</a></div>

<p style="margin-top:16px;color:#666;font-size:13px">
실제 데이터 연동용으로는 기존 Lite V3의 JavaScript를 그대로 사용하고,
행 레이아웃만 이 형태로 변경하면 됩니다.
</p>
</body></html>
