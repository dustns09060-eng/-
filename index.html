<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>여우방 명단</title>
<style>
body{
  margin:0;
  padding:12px;
  font-family:Arial,"Malgun Gothic",sans-serif;
  background:#fff;
  color:#222;
}
h1{
  font-size:22px;
  margin:0 0 12px;
}
.box{
  border:1px solid #bbb;
  padding:10px;
  margin-bottom:12px;
}
input{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  font-size:15px;
  border:1px solid #aaa;
  margin-bottom:8px;
}
button{
  padding:9px 12px;
  border:1px solid #888;
  background:#f4f4f4;
  color:#222;
  font-weight:bold;
}
.pages{
  display:flex;
  gap:6px;
  overflow-x:auto;
  padding:10px 0 4px;
}
.page-btn{
  white-space:nowrap;
}
.active{
  background:#222;
  color:#fff;
}
.count{
  font-size:13px;
  color:#666;
  margin-top:8px;
}
.person{
  border-bottom:1px solid #ddd;
  padding:10px 2px;
  line-height:1.45;
}
.name{
  font-weight:bold;
}
.insta{
  display:inline-block;
  margin-top:3px;
  color:#1666c1;
  text-decoration:underline;
  word-break:break-all;
}
.empty{
  padding:24px 0;
  text-align:center;
  color:#777;
}
</style>
</head>
<body>

<h1>여우방 명단</h1>

<div class="box">
  <input id="search" placeholder="번호, 닉네임, 아이디 검색" oninput="render()">
  <button onclick="loadData()">새로고침</button>
  <div id="pages" class="pages"></div>
  <div id="count" class="count">불러오는 중...</div>
</div>

<div id="list"></div>

<script>
const SHEET_ID = "1m14GywxIymZp6p9izJ6QVWaC8fCnjr5F5OdXCKKUcss";
const SHEET_NAME = "Sheet1";
const PAGE_SIZE = 500;

let data = [];
let currentPage = "전체";

function normalizeInsta(value) {
  value = String(value || "").trim();
  if (!value) return "";
  return value.startsWith("@") ? value : "@" + value;
}

function loadWithJsonp() {
  return new Promise((resolve, reject) => {
    const callbackName = "liteV3Callback_" + Date.now();
    const script = document.createElement("script");

    const timer = setTimeout(() => {
      try { delete window[callbackName]; } catch (e) {}
      script.remove();
      reject(new Error("timeout"));
    }, 12000);

    window[callbackName] = function(json) {
      clearTimeout(timer);
      try { delete window[callbackName]; } catch (e) {}
      script.remove();
      resolve(json);
    };

    script.onerror = function() {
      clearTimeout(timer);
      try { delete window[callbackName]; } catch (e) {}
      script.remove();
      reject(new Error("load error"));
    };

    script.src =
      "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
      "/gviz/tq?sheet=" + encodeURIComponent(SHEET_NAME) +
      "&tqx=responseHandler:" + callbackName + ";out:json&cache=" + Date.now();

    document.head.appendChild(script);
  });
}

function parseRows(json) {
  const rows = json.table && json.table.rows ? json.table.rows : [];

  return rows.map(function(row) {
    const cells = row.c || [];
    return {
      no: Number(String(cells[0] && cells[0].v != null ? cells[0].v : "").replace(/[^0-9]/g, "")),
      nickname: String(cells[1] && cells[1].v != null ? cells[1].v : "").trim(),
      insta: normalizeInsta(cells[2] && cells[2].v != null ? cells[2].v : "")
    };
  })
  .filter(function(item) {
    return item.no && item.nickname && item.insta;
  })
  .sort(function(a, b) {
    return a.no - b.no;
  });
}

async function loadData() {
  document.getElementById("count").textContent = "불러오는 중...";
  document.getElementById("list").innerHTML = "";

  try {
    const json = await loadWithJsonp();
    data = parseRows(json);
    makePages();
    render();
  } catch (error) {
    document.getElementById("count").textContent = "연동 오류";
    document.getElementById("list").innerHTML =
      '<div class="empty">명단을 불러오지 못했습니다.</div>';
  }
}

function makePages() {
  const maxNo = data.length ? Math.max.apply(null, data.map(function(item) { return item.no; })) : 0;
  const pageCount = Math.ceil(maxNo / PAGE_SIZE);

  let html =
    '<button class="page-btn ' + (currentPage === "전체" ? "active" : "") +
    '" onclick="selectPage(\'전체\')">전체</button>';

  for (let i = 0; i < pageCount; i++) {
    const start = i * PAGE_SIZE + 1;
    const end = Math.min((i + 1) * PAGE_SIZE, maxNo);
    const label = start + "~" + end;

    html +=
      '<button class="page-btn ' + (currentPage === i ? "active" : "") +
      '" onclick="selectPage(' + i + ')">' + label + '</button>';
  }

  document.getElementById("pages").innerHTML = html;
}

function selectPage(page) {
  currentPage = page;
  makePages();
  render();
}

function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, function(char) {
    return {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char];
  });
}

function render() {
  const query = document.getElementById("search").value.toLowerCase().trim();

  const filtered = data.filter(function(item) {
    const text = (item.no + " " + item.nickname + " " + item.insta).toLowerCase();
    const searchMatch = text.includes(query);

    if (currentPage === "전체") {
      return searchMatch;
    }

    const start = currentPage * PAGE_SIZE + 1;
    const end = (currentPage + 1) * PAGE_SIZE;
    const pageMatch = item.no >= start && item.no <= end;

    return searchMatch && pageMatch;
  });

  document.getElementById("count").textContent =
    "검색 결과 " + filtered.length.toLocaleString() + "명";

  if (!filtered.length) {
    document.getElementById("list").innerHTML =
      '<div class="empty">표시할 인원이 없습니다.</div>';
    return;
  }

  let html = "";

  filtered.forEach(function(item) {
    const instagramId = item.insta.replace("@", "");

    html +=
      '<div class="person">' +
        '<div class="name">' + item.no + '. ' + escapeHtml(item.nickname) + '</div>' +
        '<a class="insta" target="_blank" rel="noopener" href="https://www.instagram.com/' +
          encodeURIComponent(instagramId) + '/">' +
          escapeHtml(item.insta) +
        '</a>' +
      '</div>';
  });

  document.getElementById("list").innerHTML = html;
}

loadData();
</script>
</body>
</html>
